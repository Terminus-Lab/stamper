version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: stamper
    binary: stamper
    main: ./cmd/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - .env.example

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
  groups:
    - title: Features
      regexp: '^feat:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix:'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: Terminus-Lab
    name: stamper
  draft: false
  prerelease: auto
  name_template: "stamper v{{.Version}}"
  footer: |
    ## Installation

    **Choose your platform:**
    - **macOS (Apple Silicon)**: `stamper_{{.Version}}_darwin_arm64.tar.gz`
    - **macOS (Intel)**: `stamper_{{.Version}}_darwin_amd64.tar.gz`
    - **Linux (x64)**: `stamper_{{.Version}}_linux_amd64.tar.gz`
    - **Linux (ARM)**: `stamper_{{.Version}}_linux_arm64.tar.gz`
    - **Windows (x64)**: `stamper_{{.Version}}_windows_amd64.zip`
    - **Windows (ARM)**: `stamper_{{.Version}}_windows_arm64.zip`

    **Extract and run:**
    ```bash
    tar -xzf stamper_{{.Version}}_darwin_arm64.tar.gz
    cp .env.example .env
    ./stamper -i sampled.jsonl
    ```

    ### Go Install
    ```bash
    go install github.com/Terminus-Lab/stamper/cmd@{{.Tag}}
    ```

    See [README.md](https://github.com/Terminus-Lab/stamper/blob/main/README.md) for full usage.
